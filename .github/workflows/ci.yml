name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm clean-install

      - name: Lint commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            FROM="$PR_BASE_SHA"
            TO="$PR_HEAD_SHA"
          else
            FROM="$PUSH_BEFORE"
            TO="$GITHUB_SHA_VALUE"
          fi

          if [ -z "$TO" ]; then
            echo "Missing target SHA for commitlint"
            exit 1
          fi

          if [ -z "$FROM" ] || [ "$FROM" = "0000000000000000000000000000000000000000" ]; then
            npx commitlint --last --verbose
            exit 0
          fi

          npx commitlint --from "$FROM" --to "$TO" --verbose

      - name: Typecheck
        run: bunx tsc -p tsconfig.json

      - name: Tests
        run: bun ./src/output-compactor-test.ts && bun ./src/command-rewriter-test.ts && bun ./src/runtime-guard-test.ts && bun ./src/additional-coverage-test.ts && bun ./src/config-modal-test.ts && bun ./src/index-test.ts

      - name: Bundle check
        run: bun run build:check
